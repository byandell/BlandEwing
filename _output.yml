bookdown::gitbook:
  css: style.css
  highlight: null
  config:
    toc:
      before: |
        <li><a href="./">Bland Ewing Story</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    edit: https://github.com/byandell/BlandEwing/edit/master/%s
    download: ["pdf", "epub"]
    toc_depth: 2
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
  highlight: null
  toc_depth: 2
bookdown::epub_book: 
  highlight: null
